<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Manga → PDF</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0f1117;
      --surface:   #1a1d27;
      --surface2:  #22263a;
      --border:    #2e3352;
      --accent:    #7c6af7;
      --accent-h:  #9b8dff;
      --green:     #34d399;
      --red:       #f87171;
      --yellow:    #fbbf24;
      --text:      #e2e8f0;
      --muted:     #8892a4;
      --radius:    12px;
      --font-mono: "JetBrains Mono", "Fira Code", "Cascadia Code", monospace;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 48px 16px 80px;
    }

    .container {
      width: 100%;
      max-width: 680px;
    }

    /* ── Header ── */
    header {
      text-align: center;
      margin-bottom: 40px;
    }
    .logo {
      font-size: 2.6rem;
      margin-bottom: 8px;
    }
    header h1 {
      font-size: 1.8rem;
      font-weight: 700;
      letter-spacing: -0.5px;
      background: linear-gradient(135deg, #a78bfa, #60a5fa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    header p {
      color: var(--muted);
      margin-top: 6px;
      font-size: 0.95rem;
    }

    /* ── Card ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 28px;
      margin-bottom: 20px;
    }

    /* ── Form ── */
    .field {
      margin-bottom: 18px;
    }
    label {
      display: block;
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 6px;
    }
    input[type="text"],
    input[type="url"] {
      width: 100%;
      padding: 11px 14px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
    }
    input[type="text"]:focus,
    input[type="url"]:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(124, 106, 247, 0.18);
    }
    input::placeholder { color: var(--muted); }

    /* ── Button ── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 11px 22px;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: opacity 0.2s, transform 0.1s;
    }
    .btn:active { transform: scale(0.98); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    .btn-primary {
      background: linear-gradient(135deg, var(--accent), #60a5fa);
      color: #fff;
      width: 100%;
      justify-content: center;
    }
    .btn-primary:not(:disabled):hover { opacity: 0.88; }

    .btn-download {
      background: var(--green);
      color: #0a0a0a;
      width: 100%;
      justify-content: center;
      font-size: 1rem;
      padding: 13px 22px;
    }
    .btn-download:hover { opacity: 0.88; }

    /* ── Log ── */
    .log-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }
    .log-header span {
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    .log-header button {
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 5px;
      color: var(--muted);
      font-size: 0.75rem;
      padding: 3px 10px;
      cursor: pointer;
      transition: color 0.15s;
    }
    .log-header button:hover { color: var(--text); }

    #log {
      background: #0a0c14;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px 16px;
      font-family: var(--font-mono);
      font-size: 0.78rem;
      line-height: 1.6;
      color: #c9d1d9;
      height: 340px;
      overflow-y: auto;
      white-space: pre-wrap;
      word-break: break-all;
    }

    /* ── Status badge ── */
    .status-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 3px 10px;
      border-radius: 999px;
      font-size: 0.75rem;
      font-weight: 600;
    }
    .badge-running { background: rgba(251,191,36,.15); color: var(--yellow); }
    .badge-done    { background: rgba(52,211,153,.15);  color: var(--green); }
    .badge-error   { background: rgba(248,113,113,.15); color: var(--red); }

    .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: currentColor;
    }
    .dot.pulse {
      animation: pulse 1.2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.25; }
    }

    /* ── Utility ── */
    .hidden { display: none !important; }
  </style>
</head>
<body>
  <div class="container">

    <header>
      <div class="logo">📚</div>
      <h1>Manga → PDF</h1>
      <p>Paste a chapter URL and get a PDF in seconds</p>
    </header>

    <!-- Input card -->
    <div class="card">
      <form id="downloadForm">
        <div class="field">
          <label for="urlInput">Chapter URL</label>
          <input
            type="url"
            id="urlInput"
            placeholder="https://weebcentral.com/chapters/…"
            required
            autocomplete="off"
          />
        </div>
        <div class="field">
          <label for="pdfName">PDF filename</label>
          <input
            type="text"
            id="pdfName"
            placeholder="chapter.pdf"
            value="chapter.pdf"
          />
        </div>
        <button type="submit" class="btn btn-primary" id="startBtn">
          <span id="btnIcon">⬇️</span>
          <span id="btnText">Download</span>
        </button>
      </form>
    </div>

    <!-- Progress card (hidden until job starts) -->
    <div class="card hidden" id="progressCard">
      <div class="status-bar">
        <div class="badge badge-running hidden" id="badgeRunning">
          <div class="dot pulse"></div> Running
        </div>
        <div class="badge badge-done hidden" id="badgeDone">
          <div class="dot"></div> Done
        </div>
        <div class="badge badge-error hidden" id="badgeError">
          <div class="dot"></div> Error
        </div>
      </div>
      <div class="log-header">
        <span>Progress log</span>
        <button id="clearLogBtn">Clear</button>
      </div>
      <pre id="log"></pre>
    </div>

    <!-- Download button (hidden until done) -->
    <div id="downloadArea" class="hidden">
      <a id="downloadLink" href="#" class="btn btn-download" download>
        📥 &nbsp;Save PDF
      </a>
    </div>

  </div>

  <script>
    const form        = document.getElementById("downloadForm");
    const startBtn    = document.getElementById("startBtn");
    const btnIcon     = document.getElementById("btnIcon");
    const btnText     = document.getElementById("btnText");
    const progressCard = document.getElementById("progressCard");
    const log         = document.getElementById("log");
    const clearLogBtn = document.getElementById("clearLogBtn");
    const downloadArea = document.getElementById("downloadArea");
    const downloadLink = document.getElementById("downloadLink");

    const badgeRunning = document.getElementById("badgeRunning");
    const badgeDone    = document.getElementById("badgeDone");
    const badgeError   = document.getElementById("badgeError");

    let eventSource = null;

    // ── helpers ──────────────────────────────────────────────────────────────

    function setStatus(state) {
      badgeRunning.classList.add("hidden");
      badgeDone.classList.add("hidden");
      badgeError.classList.add("hidden");
      if (state === "running") badgeRunning.classList.remove("hidden");
      if (state === "done")    badgeDone.classList.remove("hidden");
      if (state === "error")   badgeError.classList.remove("hidden");
    }

    function appendLog(text, overwrite = false) {
      if (overwrite) {
        // replace last line
        const lastNl = log.textContent.lastIndexOf("\n");
        if (lastNl !== -1) {
          log.textContent = log.textContent.slice(0, lastNl + 1) + text;
        } else {
          log.textContent = text;
        }
      } else {
        log.textContent += (log.textContent ? "\n" : "") + text;
      }
      log.scrollTop = log.scrollHeight;
    }

    function resetUI() {
      log.textContent = "";
      downloadArea.classList.add("hidden");
      downloadLink.href = "#";
      setStatus("running");
    }

    function setDownloading(on) {
      startBtn.disabled = on;
      btnIcon.textContent = on ? "⏳" : "⬇️";
      btnText.textContent = on ? "Downloading…" : "Download";
    }

    // ── form submit ──────────────────────────────────────────────────────────

    form.addEventListener("submit", async (e) => {
      e.preventDefault();

      const url     = document.getElementById("urlInput").value.trim();
      let   pdfName = document.getElementById("pdfName").value.trim() || "chapter.pdf";
      if (!pdfName.endsWith(".pdf")) pdfName += ".pdf";

      if (eventSource) { eventSource.close(); eventSource = null; }

      resetUI();
      setDownloading(true);
      progressCard.classList.remove("hidden");

      // Start the job
      let jobId;
      try {
        const res  = await fetch("/api/v1/start", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ url, pdf_name: pdfName }),
        });
        const data = await res.json();
        if (!res.ok) {
          appendLog("❌  " + (data.error || "Unknown error starting job."));
          setStatus("error");
          setDownloading(false);
          return;
        }
        jobId = data.job_id;
      } catch (err) {
        appendLog("❌  Could not reach the server: " + err.message);
        setStatus("error");
        setDownloading(false);
        return;
      }

      // Stream progress
      eventSource = new EventSource(`/api/v1/stream/${jobId}`);

      eventSource.onmessage = (e) => {
        const msg = JSON.parse(e.data);
        if (msg.type === "log") {
          appendLog(msg.message, msg.cr);
        } else if (msg.type === "done") {
          eventSource.close();
          setDownloading(false);
          if (msg.status === "done") {
            setStatus("done");
            appendLog("\n✅  All done! Click the button below to save your PDF.");
            downloadLink.href = `/api/v1/download`;
            downloadLink.setAttribute("download", msg.pdf);
            downloadArea.classList.remove("hidden");
          } else {
            setStatus("error");
            appendLog("\n❌  Job finished with errors.");
          }
        }
        // heartbeat — do nothing
      };

      eventSource.onerror = () => {
        eventSource.close();
        setDownloading(false);
        setStatus("error");
        appendLog("\n⚠️  Lost connection to server.");
      };
    });

    // ── clear log ────────────────────────────────────────────────────────────
    clearLogBtn.addEventListener("click", () => { log.textContent = ""; });
  </script>
</body>
</html>
